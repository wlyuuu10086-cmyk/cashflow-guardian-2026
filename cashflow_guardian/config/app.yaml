# CashFlow Guardian Application Configuration
app:
  name: "CashFlow Guardian"
  version: "1.0.0"
  subtitle: "An Agentic Early-Warning and Decision-Support System for SME Cash-Flow Stress"
  description: "A production-grade risk monitoring and scenario analysis tool for SMEs."
  active_environment: "local"  # Overridden by environment variables or specific profiles

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output: "stdout"
  mask_pii: true
  mask_memos: true

llm:
  provider: "google"
  model_name: "gemini-1.5-flash"  # Target model for the early-warning agent reasoning
  temperature: 0.1
  max_output_tokens: 2048
  api_key_env_var: "GEMINI_API_KEY"

features:
  enable_agent: true
  enable_scenario_simulation: true
  enable_hitl_watchlist: true
